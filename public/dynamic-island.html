<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Island — iPhone 15 Pro</title>
    <link
        href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Wallpaper background */
        .wallpaper {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(120, 0, 255, 0.3), transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0, 122, 255, 0.25), transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 55, 95, 0.15), transparent 60%),
                linear-gradient(160deg, #0a0a1a 0%, #1a0a2e 30%, #0d1b2a 60%, #0a0a1a 100%);
            z-index: 0;
        }

        /* ═══════════════════════════════════════════════
   DYNAMIC ISLAND CORE
   ═══════════════════════════════════════════════ */
        .dynamic-island {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;

            /* Shape & Size — default compact state */
            width: 126px;
            height: 37px;
            border-radius: 50px;

            /* Visual */
            background: rgba(0, 0, 0, 0.94);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            box-shadow:
                0 0 0 0.5px rgba(255, 255, 255, 0.08),
                0 2px 12px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(0, 0, 0, 0.3);

            /* Animation */
            transition:
                width 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                height 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                border-radius 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s ease;

            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dynamic-island:hover {
            box-shadow:
                0 0 0 0.5px rgba(255, 255, 255, 0.12),
                0 4px 20px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(0, 0, 0, 0.4);
        }

        .dynamic-island:active {
            transform: translateX(-50%) scale(0.97);
        }

        /* Subtle breathing glow */
        @keyframes breathe {

            0%,
            100% {
                box-shadow: 0 0 0 0.5px rgba(255, 255, 255, 0.08), 0 2px 12px rgba(0, 0, 0, 0.5);
            }

            50% {
                box-shadow: 0 0 0 0.5px rgba(255, 255, 255, 0.12), 0 2px 16px rgba(0, 0, 0, 0.4), 0 0 20px rgba(100, 100, 255, 0.06);
            }
        }

        .dynamic-island.idle {
            animation: breathe 4s ease-in-out infinite;
        }

        /* ─── Expansion States ─── */
        .dynamic-island.expand-wide {
            width: 350px;
            height: 37px;
        }

        .dynamic-island.expand-minimal {
            width: 340px;
            height: 60px;
            border-radius: 34px;
        }

        .dynamic-island.expand-medium {
            width: 360px;
            height: 140px;
            border-radius: 42px;
        }

        .dynamic-island.expand-full {
            width: 370px;
            height: 220px;
            border-radius: 46px;
        }

        /* ─── Content container ─── */
        .island-content {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.25s ease 0.15s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s;
            pointer-events: none;
        }

        .dynamic-island.expanded .island-content {
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
        }

        /* Compact content (visible in default state) */
        .island-compact {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: opacity 0.15s ease;
            pointer-events: none;
        }

        .dynamic-island.expanded .island-compact {
            opacity: 0;
        }

        /* ═══════════════════════════════════════════════
   MUSIC PLAYER STATE
   ═══════════════════════════════════════════════ */

        /* Compact — just waveform + album art */
        .music-compact {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
        }

        .music-compact .album-tiny {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: linear-gradient(135deg, #FF6B6B, #FF3366);
            flex-shrink: 0;
        }

        .music-waveform {
            display: flex;
            gap: 2px;
            align-items: center;
            height: 20px;
        }

        .music-waveform .bar {
            width: 2.5px;
            border-radius: 2px;
            background: #1DB954;
            animation: waveform 0.8s ease-in-out infinite alternate;
        }

        .bar:nth-child(1) {
            height: 6px;
            animation-delay: 0s;
        }

        .bar:nth-child(2) {
            height: 12px;
            animation-delay: 0.15s;
        }

        .bar:nth-child(3) {
            height: 8px;
            animation-delay: 0.3s;
        }

        .bar:nth-child(4) {
            height: 14px;
            animation-delay: 0.1s;
        }

        .bar:nth-child(5) {
            height: 6px;
            animation-delay: 0.25s;
        }

        @keyframes waveform {
            0% {
                transform: scaleY(0.4);
            }

            100% {
                transform: scaleY(1);
            }
        }

        /* Expanded Music Player */
        .music-expanded {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            height: 100%;
            padding: 14px 18px;
        }

        .music-expanded .album-art {
            width: 80px;
            height: 80px;
            border-radius: 14px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #FF6B6B, #FF3366, #CC5599);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            animation: albumSpin 8s linear infinite;
        }

        @keyframes albumSpin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .music-expanded .track-info {
            flex: 1;
            min-width: 0;
        }

        .music-expanded .track-title {
            font-weight: 600;
            font-size: 14px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-expanded .track-artist {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 2px;
        }

        .music-controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            align-items: center;
        }

        .music-controls button {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        .music-controls button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .music-controls .play-btn {
            width: 36px;
            height: 36px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.15);
        }

        .music-controls .play-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .progress-track {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #1DB954;
            border-radius: 2px;
            width: 35%;
            transition: width 0.3s;
        }

        /* ═══════════════════════════════════════════════
   TIMER STATE
   ═══════════════════════════════════════════════ */
        .timer-compact {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
        }

        .timer-compact .timer-icon {
            font-size: 16px;
        }

        .timer-compact .timer-value {
            font-weight: 600;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            color: #FF9F0A;
        }

        .timer-expanded {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
        }

        .timer-circle {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .timer-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-circle .track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 4;
        }

        .timer-circle .progress {
            fill: none;
            stroke: #FF9F0A;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 226;
            stroke-dashoffset: 60;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-display {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: #FF9F0A;
        }

        .timer-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }

        .timer-controls {
            display: flex;
            gap: 16px;
        }

        .timer-controls button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }

        .timer-controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .timer-controls .stop-btn {
            background: rgba(255, 59, 48, 0.2);
            color: #FF3B30;
        }

        .timer-controls .stop-btn:hover {
            background: rgba(255, 59, 48, 0.35);
        }

        /* ═══════════════════════════════════════════════
   NOTIFICATION STATE
   ═══════════════════════════════════════════════ */
        .notif-compact {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
        }

        .notif-compact .notif-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #007AFF;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.4);
                opacity: 0.5;
            }
        }

        .notif-compact .notif-icon {
            font-size: 16px;
        }

        .notif-expanded {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            width: 100%;
            padding: 14px 18px;
        }

        .notif-app-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #007AFF, #5856D6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .notif-body {
            flex: 1;
            min-width: 0;
        }

        .notif-app-name {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .notif-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .notif-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .notif-time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .notif-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .notif-actions button {
            flex: 1;
            padding: 8px 12px;
            border-radius: 12px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .notif-actions .notif-primary {
            background: #007AFF;
            color: #fff;
        }

        .notif-actions .notif-primary:hover {
            background: #0A84FF;
        }

        .notif-actions .notif-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }

        .notif-actions .notif-secondary:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        /* ═══════════════════════════════════════════════
   CALL STATE
   ═══════════════════════════════════════════════ */
        .call-compact {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 8px;
        }

        .call-compact .call-avatar-tiny {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, #30D158, #34C759);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .call-compact .call-timer {
            font-size: 12px;
            font-weight: 600;
            color: #30D158;
            font-variant-numeric: tabular-nums;
        }

        .call-compact .call-wave {
            display: flex;
            gap: 1.5px;
            align-items: center;
        }

        .call-compact .call-wave .cbar {
            width: 2px;
            border-radius: 1px;
            background: #30D158;
            animation: waveform 0.6s ease-in-out infinite alternate;
        }

        .cbar:nth-child(1) {
            height: 4px;
            animation-delay: 0s;
        }

        .cbar:nth-child(2) {
            height: 8px;
            animation-delay: 0.1s;
        }

        .cbar:nth-child(3) {
            height: 5px;
            animation-delay: 0.2s;
        }

        .call-expanded {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
        }

        .call-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .call-name {
            font-size: 16px;
            font-weight: 600;
        }

        .call-status {
            font-size: 12px;
            color: #30D158;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .call-buttons {
            display: flex;
            gap: 20px;
            margin-top: 6px;
        }

        .call-buttons button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .call-btn-mute {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .call-btn-mute:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .call-btn-end {
            background: #FF3B30;
            color: #fff;
        }

        .call-btn-end:hover {
            background: #FF453A;
            transform: scale(1.08);
        }

        .call-btn-speaker {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .call-btn-speaker:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ═══════════════════════════════════════════════
   DEMO CONTROLS (not part of island)
   ═══════════════════════════════════════════════ */
        .demo {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 80px 20px 40px;
            gap: 24px;
        }

        .demo h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            line-height: 1.1;
        }

        .demo p.sub {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.45);
            text-align: center;
            max-width: 400px;
        }

        .btn-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 420px;
            margin-top: 12px;
        }

        .demo-btn {
            padding: 12px 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .demo-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .demo-btn:active {
            transform: translateY(0) scale(0.97);
        }

        .demo-btn .icon {
            font-size: 18px;
        }

        .demo-btn.active {
            background: rgba(0, 122, 255, 0.15);
            border-color: rgba(0, 122, 255, 0.4);
            color: #0A84FF;
        }

        .footer-note {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            text-align: center;
            z-index: 1;
        }

        /* Responsive */
        @media (max-width: 420px) {
            .dynamic-island.expand-minimal {
                width: calc(100vw - 40px);
            }

            .dynamic-island.expand-medium {
                width: calc(100vw - 30px);
            }

            .dynamic-island.expand-full {
                width: calc(100vw - 24px);
            }

            .dynamic-island.expand-wide {
                width: calc(100vw - 40px);
            }

            .demo h1 {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="wallpaper"></div>

    <!-- ═══════════ DYNAMIC ISLAND ═══════════ -->
    <div class="dynamic-island idle" id="island">
        <!-- Compact content (visible in small state) -->
        <div class="island-compact" id="compact-content"></div>
        <!-- Expanded content (visible in expanded state) -->
        <div class="island-content" id="expanded-content"></div>
    </div>

    <!-- ═══════════ DEMO UI ═══════════ -->
    <div class="demo">
        <h1>Dynamic Island</h1>
        <p class="sub">Tap to expand. Tap again to collapse. Try the different states below.</p>

        <div class="btn-grid">
            <button class="demo-btn" onclick="setMode('music')">
                <span class="icon">🎵</span> Music
            </button>
            <button class="demo-btn" onclick="setMode('timer')">
                <span class="icon">⏱️</span> Timer
            </button>
            <button class="demo-btn" onclick="setMode('notification')">
                <span class="icon">🔔</span> Notification
            </button>
            <button class="demo-btn" onclick="setMode('call')">
                <span class="icon">📞</span> Phone Call
            </button>
            <button class="demo-btn" onclick="collapse()">
                <span class="icon">⬆️</span> Collapse
            </button>
            <button class="demo-btn" onclick="resetIsland()">
                <span class="icon">🔄</span> Reset
            </button>
        </div>
    </div>

    <div class="footer-note">Click the island or use the buttons below · Built with HTML + CSS + JS</div>

    <script>
        // ═══════════════════════════════════════════════
        // DYNAMIC ISLAND — JavaScript Controller
        // ═══════════════════════════════════════════════

        const island = document.getElementById('island');
        const compactEl = document.getElementById('compact-content');
        const expandedEl = document.getElementById('expanded-content');

        let currentMode = 'idle';
        let isExpanded = false;
        let timerInterval = null;
        let callInterval = null;
        let timerSeconds = 185; // 3:05
        let callSeconds = 0;
        let musicPlaying = true;
        let progressPercent = 35;

        // Haptic feedback (vibration API)
        function haptic(ms = 10) {
            if (navigator.vibrate) navigator.vibrate(ms);
        }

        // ─── State Management ───
        function setMode(mode) {
            haptic(15);
            currentMode = mode;

            // Highlight active button
            document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
            event?.target?.closest('.demo-btn')?.classList.add('active');

            // Set compact content
            setCompactContent(mode);

            // Auto-expand
            expand(mode);

            // Start intervals
            clearAllIntervals();
            if (mode === 'timer') startTimerTick();
            if (mode === 'call') { callSeconds = 0; startCallTick(); }
        }

        function expand(mode) {
            island.classList.remove('idle', 'expand-wide', 'expand-minimal', 'expand-medium', 'expand-full');
            island.classList.add('expanded');
            isExpanded = true;

            switch (mode) {
                case 'music':
                    island.classList.add('expand-medium');
                    setExpandedContent(getMusicExpanded());
                    break;
                case 'timer':
                    island.classList.add('expand-full');
                    setExpandedContent(getTimerExpanded());
                    break;
                case 'notification':
                    island.classList.add('expand-full');
                    setExpandedContent(getNotifExpanded());
                    break;
                case 'call':
                    island.classList.add('expand-full');
                    setExpandedContent(getCallExpanded());
                    break;
            }
        }

        function collapse() {
            haptic(8);
            island.classList.remove('expanded', 'expand-wide', 'expand-minimal', 'expand-medium', 'expand-full');
            isExpanded = false;
            if (currentMode === 'idle') island.classList.add('idle');
        }

        function resetIsland() {
            haptic(20);
            clearAllIntervals();
            currentMode = 'idle';
            isExpanded = false;
            timerSeconds = 185;
            callSeconds = 0;
            musicPlaying = true;
            progressPercent = 35;
            island.classList.remove('expanded', 'expand-wide', 'expand-minimal', 'expand-medium', 'expand-full');
            island.classList.add('idle');
            compactEl.innerHTML = '';
            expandedEl.innerHTML = '';
            document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
        }

        function clearAllIntervals() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            if (callInterval) { clearInterval(callInterval); callInterval = null; }
        }

        // ─── Click handler ───
        island.addEventListener('click', (e) => {
            // Don't toggle if clicking interactive elements inside
            if (e.target.closest('button') || e.target.closest('.notif-actions')) return;

            haptic(10);
            if (isExpanded) {
                collapse();
            } else if (currentMode !== 'idle') {
                expand(currentMode);
            }
        });

        // ─── Compact Content Templates ───
        function setCompactContent(mode) {
            switch (mode) {
                case 'music':
                    compactEl.innerHTML = `
        <div class="music-compact">
          <div class="album-tiny"></div>
          <div class="music-waveform">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          </div>
        </div>`;
                    break;
                case 'timer':
                    compactEl.innerHTML = `
        <div class="timer-compact">
          <span class="timer-icon">⏱️</span>
          <span class="timer-value" id="timer-compact-val">${formatTime(timerSeconds)}</span>
        </div>`;
                    break;
                case 'notification':
                    compactEl.innerHTML = `
        <div class="notif-compact">
          <div class="notif-dot"></div>
          <span class="notif-icon">💬</span>
        </div>`;
                    break;
                case 'call':
                    compactEl.innerHTML = `
        <div class="call-compact">
          <div class="call-avatar-tiny">S</div>
          <div class="call-wave">
            <div class="cbar"></div><div class="cbar"></div><div class="cbar"></div>
          </div>
          <span class="call-timer" id="call-compact-val">${formatTime(callSeconds)}</span>
        </div>`;
                    break;
            }
        }

        function setExpandedContent(html) {
            expandedEl.innerHTML = html;
        }

        // ─── Expanded Content Templates ───
        function getMusicExpanded() {
            return `
    <div class="music-expanded">
      <div class="album-art">♫</div>
      <div class="track-info">
        <div class="track-title">Blinding Lights</div>
        <div class="track-artist">The Weeknd</div>
        <div class="music-controls">
          <button onclick="event.stopPropagation()">⏮</button>
          <button class="play-btn" id="play-toggle" onclick="togglePlay(event)">${musicPlaying ? '⏸' : '▶'}</button>
          <button onclick="event.stopPropagation()">⏭</button>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="music-progress" style="width:${progressPercent}%"></div>
        </div>
      </div>
    </div>`;
        }

        function getTimerExpanded() {
            const pct = (timerSeconds / 300) * 226;
            return `
    <div class="timer-expanded">
      <div class="timer-circle">
        <svg viewBox="0 0 80 80">
          <circle class="track" cx="40" cy="40" r="36"/>
          <circle class="progress" cx="40" cy="40" r="36" id="timer-ring" style="stroke-dashoffset:${226 - pct}"/>
        </svg>
        <div class="timer-display" id="timer-expanded-val">${formatTime(timerSeconds)}</div>
      </div>
      <div class="timer-label">TIMER</div>
      <div class="timer-controls">
        <button class="stop-btn" onclick="resetTimer(event)" title="Reset">■</button>
        <button onclick="toggleTimer(event)" id="timer-toggle-btn" title="Pause">⏸</button>
      </div>
    </div>`;
        }

        function getNotifExpanded() {
            return `
    <div class="notif-expanded">
      <div class="notif-app-icon">💬</div>
      <div class="notif-body">
        <div class="notif-app-name">Messages</div>
        <div class="notif-title">Rahul Sharma</div>
        <div class="notif-text">Hey! Are you coming to the campus event tonight? It starts at 7 PM 🎉</div>
        <div class="notif-actions">
          <button class="notif-secondary" onclick="dismissNotif(event)">Dismiss</button>
          <button class="notif-primary" onclick="replyNotif(event)">Reply</button>
        </div>
      </div>
      <div class="notif-time">now</div>
    </div>`;
        }

        function getCallExpanded() {
            return `
    <div class="call-expanded">
      <div class="call-avatar">S</div>
      <div class="call-name">Sidharth</div>
      <div class="call-status" id="call-expanded-val">${formatTime(callSeconds)}</div>
      <div class="call-buttons">
        <button class="call-btn-mute" onclick="event.stopPropagation()" title="Mute">🔇</button>
        <button class="call-btn-end" onclick="endCall(event)" title="End Call">📞</button>
        <button class="call-btn-speaker" onclick="event.stopPropagation()" title="Speaker">🔊</button>
      </div>
    </div>`;
        }

        // ─── Helpers ───
        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        // ─── Music Controls ───
        function togglePlay(e) {
            e.stopPropagation();
            haptic(8);
            musicPlaying = !musicPlaying;
            const btn = document.getElementById('play-toggle');
            if (btn) btn.textContent = musicPlaying ? '⏸' : '▶';

            // Toggle waveform animation
            const bars = document.querySelectorAll('.music-waveform .bar');
            bars.forEach(bar => {
                bar.style.animationPlayState = musicPlaying ? 'running' : 'paused';
            });

            // Simulate progress
            if (musicPlaying) {
                const prog = setInterval(() => {
                    if (!musicPlaying) { clearInterval(prog); return; }
                    progressPercent = Math.min(100, progressPercent + 0.5);
                    const fill = document.getElementById('music-progress');
                    if (fill) fill.style.width = progressPercent + '%';
                    if (progressPercent >= 100) { progressPercent = 0; clearInterval(prog); }
                }, 300);
            }
        }

        // ─── Timer Controls ───
        let timerRunning = true;

        function startTimerTick() {
            timerRunning = true;
            timerInterval = setInterval(() => {
                if (!timerRunning) return;
                timerSeconds = Math.max(0, timerSeconds - 1);
                updateTimerDisplay();
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    haptic(50);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const val = formatTime(timerSeconds);
            const compactVal = document.getElementById('timer-compact-val');
            const expandedVal = document.getElementById('timer-expanded-val');
            if (compactVal) compactVal.textContent = val;
            if (expandedVal) expandedVal.textContent = val;

            // Update ring
            const pct = (timerSeconds / 300) * 226;
            const ring = document.getElementById('timer-ring');
            if (ring) ring.style.strokeDashoffset = 226 - pct;
        }

        function toggleTimer(e) {
            e.stopPropagation();
            haptic(8);
            timerRunning = !timerRunning;
            const btn = document.getElementById('timer-toggle-btn');
            if (btn) btn.textContent = timerRunning ? '⏸' : '▶';
        }

        function resetTimer(e) {
            e.stopPropagation();
            haptic(15);
            timerSeconds = 300;
            timerRunning = true;
            updateTimerDisplay();
            const btn = document.getElementById('timer-toggle-btn');
            if (btn) btn.textContent = '⏸';
        }

        // ─── Call Controls ───
        function startCallTick() {
            callInterval = setInterval(() => {
                callSeconds++;
                const val = formatTime(callSeconds);
                const compactVal = document.getElementById('call-compact-val');
                const expandedVal = document.getElementById('call-expanded-val');
                if (compactVal) compactVal.textContent = val;
                if (expandedVal) expandedVal.textContent = val;
            }, 1000);
        }

        function endCall(e) {
            e.stopPropagation();
            haptic(30);
            clearInterval(callInterval);
            callSeconds = 0;
            collapse();
            setTimeout(() => resetIsland(), 500);
        }

        // ─── Notification Controls ───
        function dismissNotif(e) {
            e.stopPropagation();
            haptic(10);
            collapse();
            setTimeout(() => resetIsland(), 400);
        }

        function replyNotif(e) {
            e.stopPropagation();
            haptic(10);
            const body = expandedEl.querySelector('.notif-text');
            if (body) body.textContent = 'Opening Messages...';
            setTimeout(() => { collapse(); resetIsland(); }, 800);
        }

        // ─── Auto-collapse on outside click ───
        document.addEventListener('click', (e) => {
            if (!island.contains(e.target) && !e.target.closest('.demo-btn') && isExpanded) {
                collapse();
            }
        });

        // ─── Keyboard shortcut ───
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') collapse();
            if (e.key === '1') setMode('music');
            if (e.key === '2') setMode('timer');
            if (e.key === '3') setMode('notification');
            if (e.key === '4') setMode('call');
            if (e.key === '0') resetIsland();
        });
    </script>
</body>

</html>
